# ============================================================
# Unified Agent Gateway (UAG) - Docker Compose Production
# ============================================================
# Production-ready deployment with all options enabled
# ============================================================

services:
  # ----------------------------------------------------------------
  # Unified Agent Gateway (UAG) API Server
  # ----------------------------------------------------------------
  codara:
    build:
      context: .
      dockerfile: Dockerfile
    image: codara:latest
    container_name: codara
    ports:
      - "${UAG_PORT:-8000}:8000"
    environment:
      # Server
      - UAG_HOST=0.0.0.0
      - UAG_PORT=8000
      - UAG_DEBUG=${UAG_DEBUG:-false}
      
      # Database (SQLite)
      - UAG_DATABASE_PATH=/data/codara.db
      
      # Workspaces
      - UAG_WORKSPACES_ROOT=/workspaces
      
      # Security (REQUIRED - set in .env)
      - UAG_MGMT_SECRET=${UAG_MGMT_SECRET}
      - API_TOKEN=${API_TOKEN}
      
      # Redis
      - REDIS_URL=redis://redis:6379/0
      
      # Provider billing (optional)
      - UAG_CODEX_BILLING_API_KEY=${UAG_CODEX_BILLING_API_KEY:-}
      - UAG_CODEX_USAGE_ENDPOINTS=${UAG_CODEX_USAGE_ENDPOINTS:-https://chatgpt.com/backend-api/wham/usage,https://api.openai.com/dashboard/codex/usage}
      - UAG_GEMINI_BILLING_API_KEY=${UAG_GEMINI_BILLING_API_KEY:-}
      
      # Compression
      - UAG_COMPRESSION_THRESHOLD=${UAG_COMPRESSION_THRESHOLD:-64000}
      - UAG_COMPRESSION_MODEL=${UAG_COMPRESSION_MODEL:-gpt-4o-mini}
      
      # Concurrency
      - UAG_MAX_CONCURRENCY=${UAG_MAX_CONCURRENCY:-10}
      - UAG_SESSION_TTL_HOURS=${UAG_SESSION_TTL_HOURS:-24}
      
      # Rate limits
      - UAG_DEFAULT_TPM_LIMIT=${UAG_DEFAULT_TPM_LIMIT:-100000}
      - UAG_DEFAULT_RPD_LIMIT=${UAG_DEFAULT_RPD_LIMIT:-5000}
      - UAG_DEFAULT_HOURLY_LIMIT=${UAG_DEFAULT_HOURLY_LIMIT:-50000}
      - UAG_DEFAULT_WEEKLY_LIMIT=${UAG_DEFAULT_WEEKLY_LIMIT:-1000000}
    volumes:
      - codara_data:/data
      - codara_workspaces:/workspaces
      - ./codara.toml:/config/codara.toml:ro
      - ${CODEX_AUTH_PATH:-~/.codex/auth.json}:/root/.codex/auth.json:ro
      - ${GEMINI_AUTH_PATH:-~/.gemini/oauth_creds.json}:/root/.gemini/oauth_creds.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/management/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - codara-network
    # Security: run as non-root user (already configured in Dockerfile)
    # tmpfs for /tmp to prevent temporary file leaks
    tmpfs:
      - /tmp:exec,size=64M

  # ----------------------------------------------------------------
  # Redis (session locks and hot cache)
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: codara-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --timeout 0
      --tcp-keepalive 300
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - codara-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------------------------------
  # Nginx Reverse Proxy (SSL termination)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: codara-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - codara
    restart: unless-stopped
    networks:
      - codara-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

# ----------------------------------------------------------------
# Named Volumes
# ----------------------------------------------------------------
volumes:
  codara_data:
    driver: local
  codara_workspaces:
    driver: local
  redis_data:
    driver: local

# ----------------------------------------------------------------
# Networks
# ----------------------------------------------------------------
networks:
  codara-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
