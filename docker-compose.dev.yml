# ============================================================
# Unified Agent Gateway (UAG) - Docker Compose Development
# ============================================================
# Development setup with hot reload and debug mode
# ============================================================

services:
  # ----------------------------------------------------------------
  # Unified Agent Gateway (UAG) - Development Mode
  # ----------------------------------------------------------------
  codara:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: codara:dev
    container_name: codara-dev
    ports:
      - "${UAG_PORT:-8000}:8000"
      # Debug port (if using debugpy)
      - "${DEBUG_PORT:-5678}:5678"
    environment:
      # Server
      - UAG_HOST=0.0.0.0
      - UAG_PORT=8000
      - UAG_DEBUG=true
      
      # Database (SQLite for dev)
      - UAG_DATABASE_PATH=/data/codara.db
      
      # Workspaces
      - UAG_WORKSPACES_ROOT=/workspaces
      
      # Security (dev defaults - change for production)
      - UAG_MGMT_SECRET=dev-secret
      - API_TOKEN=dev-api-token
      
      # Optional: Enable debug logging
      - LOG_LEVEL=DEBUG
      
      # Redis (optional for dev)
      - REDIS_URL=${REDIS_URL:-}
    volumes:
      # Mount source for hot reload (if needed)
      - ./src:/app/src:ro
      # Data volumes
      - codara_data:/data
      - codara_workspaces:/workspaces
      # Config (optional)
      - ./codara.toml:/config/codara.toml:ro
    # Override command for development
    command: ["python", "-m", "codara.main"]
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/management/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - codara-network
    stdin_open: true
    tty: true

# ----------------------------------------------------------------
# Named Volumes
# ----------------------------------------------------------------
volumes:
  codara_data:
    driver: local
  codara_workspaces:
    driver: local

# ----------------------------------------------------------------
# Networks
# ----------------------------------------------------------------
networks:
  codara-network:
    driver: bridge
