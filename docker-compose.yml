services:
  codara:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_CLI_PACKAGE: ${CODEX_CLI_PACKAGE:-@openai/codex@latest}
        GEMINI_CLI_PACKAGE: ${GEMINI_CLI_PACKAGE:-@google/gemini-cli@latest}
        OPENCODE_CLI_PACKAGE: ${OPENCODE_CLI_PACKAGE:-opencode-ai@latest}
        PNPM_PACKAGE: ${PNPM_PACKAGE:-pnpm@latest}
        NODE_VERSION: ${NODE_VERSION:-24}
        NVM_VERSION: ${NVM_VERSION:-0.40.3}
    image: ${CODARA_IMAGE:-codara:latest}
    container_name: ${CODARA_CONTAINER_NAME:-codara}
    restart: unless-stopped
    ports:
      - "${CODARA_HTTP_PORT:-5173}:5173"
      
    volumes:
      # - codara_data:/data
      # - codara_config:/config
      # - codara_logs:/logs
      # - codara_workspaces:/workspaces
      - ./workspaces:/workspaces
      - ./configs/codara.toml:/config/codara.toml:ro
    
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/management/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - codara

networks:
  codara:
    driver: bridge
