# ============================================================
# Unified Agent Gateway (UAG) - Docker Compose
# ============================================================
# Production-ready deployment with:
# - UAG API server
# - Redis for session locks (production)
# - PostgreSQL for data persistence (production)
# ============================================================

services:
  # ----------------------------------------------------------------
  # Unified Agent Gateway (UAG) API Server
  # ----------------------------------------------------------------
  codara:
    build:
      context: .
      dockerfile: Dockerfile
    image: codara:latest
    container_name: codara
    ports:
      - "${UAG_PORT:-8000}:8000"
    environment:
      # Server
      - UAG_HOST=0.0.0.0
      - UAG_PORT=8000
      - UAG_DEBUG=${UAG_DEBUG:-false}
      
      # Database (SQLite for dev, PostgreSQL for prod)
      - UAG_DATABASE_PATH=/data/codara.db
      
      # Workspaces
      - UAG_WORKSPACES_ROOT=/workspaces
      
      # Security
      - UAG_MGMT_SECRET=${UAG_MGMT_SECRET:-changeme}
      - API_TOKEN=${API_TOKEN:-changeme}
      
      # Redis (for production session locks)
      - REDIS_URL=redis://redis:6379/0
      
      # Optional: Codex billing API key
      - UAG_CODEX_BILLING_API_KEY=${UAG_CODEX_BILLING_API_KEY:-}
      - UAG_CODEX_USAGE_ENDPOINTS=${UAG_CODEX_USAGE_ENDPOINTS:-}
      
      # Optional: Gemini billing API key
      - UAG_GEMINI_BILLING_API_KEY=${UAG_GEMINI_BILLING_API_KEY:-}
      
      # Optional: External PostgreSQL (uncomment for production)
      # - UAG_DATABASE_PATH=postgresql://codara:password@postgres:5432/codara
    volumes:
      - codara_data:/data
      - codara_workspaces:/workspaces
      - ./codara.toml:/config/codara.toml:ro
    depends_on:
      redis:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/management/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - codara-network

  # ----------------------------------------------------------------
  # Redis (for production session locks and hot cache)
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: codara-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - codara-network

  # ----------------------------------------------------------------
  # PostgreSQL (optional - for production data persistence)
  # ----------------------------------------------------------------
  # Uncomment this section for production deployment
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: codara-postgres
  #   environment:
  #     - POSTGRES_USER=codara
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
  #     - POSTGRES_DB=codara
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "${POSTGRES_PORT:-5432}:5432"
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U codara"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #   networks:
  #     - codara-network

  # ----------------------------------------------------------------
  # Nginx Reverse Proxy (optional - for SSL termination)
  # ----------------------------------------------------------------
  # Uncomment this section for production with SSL
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: codara-nginx
  #   ports:
  #     - "${NGINX_PORT:-80}:80"
  #     - "${NGINX_SSL_PORT:-443}:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - codara
  #   restart: unless-stopped
  #   networks:
  #     - codara-network

# ----------------------------------------------------------------
# Named Volumes for Data Persistence
# ----------------------------------------------------------------
volumes:
  codara_data:
    driver: local
  codara_workspaces:
    driver: local
  redis_data:
    driver: local
  # postgres_data:
  #   driver: local

# ----------------------------------------------------------------
# Docker Networks
# ----------------------------------------------------------------
networks:
  codara-network:
    driver: bridge
